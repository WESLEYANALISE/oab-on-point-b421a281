name: Bug report
description: Reportar comportamento inesperado
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: O que aconteceu?
      placeholder: Descreva o comportamento atual e o esperado.
    validations: { required: true }
  - type: textarea
    id: steps
    attributes:
      label: Como reproduzir
      placeholder: |
        1. Vá em ...
        2. Clique em ...
        3. Veja o erro
    validations: { required: true }
  - type: input
    id: env
    attributes:
      label: Ambiente
      placeholder: "iOS Safari 17 / Chrome 125 / etc."
